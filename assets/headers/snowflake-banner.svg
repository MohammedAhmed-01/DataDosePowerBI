<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SnowFlake — Schema, Warehouse &amp; Databricks Connector module">
  <defs>
    <linearGradient id="sf_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="45%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>

    <linearGradient id="sf_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="sf_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29B5E8"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <pattern id="sf_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#00D4FF" stroke-width="0.6" opacity="0.06"/>
    </pattern>

    <linearGradient id="sf_iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BCEEFF"/>
      <stop offset="55%" stop-color="#7DE3FF"/>
      <stop offset="100%" stop-color="#29B5E8"/>
    </linearGradient>

    <linearGradient id="sf_navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16294B"/>
      <stop offset="100%" stop-color="#0A1830"/>
    </linearGradient>

    <radialGradient id="sf_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DE3FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7DE3FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="sf_glowTight" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sf_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="sf_frameClip"><rect width="1200" height="280" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#sf_frameClip)">
    <rect width="1200" height="280" fill="url(#sf_bg)"/>
    <rect width="1200" height="280" fill="url(#sf_grid)"/>
    <rect x="-280" y="0" width="240" height="280" fill="url(#sf_scan)">
      <animate attributeName="x" values="-280;1260" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="277" rx="22" fill="none" stroke="url(#sf_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.75;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <path d="M26 20 L26 46 M26 20 L52 20" stroke="#00D4FF" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 260 L1174 234 M1174 260 L1148 260" stroke="#7C3AED" stroke-width="2.2" fill="none" opacity="0.85"/>

  <g fill="#00D4FF" opacity="0.55">
    <circle cx="980" cy="50" r="2.2"><animate attributeName="cy" values="50;38;50" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="210" r="1.8"><animate attributeName="cy" values="210;224;210" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="230" r="1.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <circle cx="195" cy="152" r="120" fill="url(#sf_halo)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- stacked warehouse layers (staging -> dim -> fact -> analytics), absolute coords -->
  <g filter="url(#sf_glowTight)" opacity="0.92">
    <rect x="40" y="206" width="60" height="10" rx="3" fill="#29B5E8" opacity="0.55"/>
    <rect x="40" y="190" width="60" height="10" rx="3" fill="#7DE3FF" opacity="0.7"/>
    <rect x="40" y="174" width="60" height="10" rx="3" fill="#7DE3FF" opacity="0.85"/>
    <rect x="40" y="158" width="60" height="10" rx="3" fill="#BCEEFF"/>
  </g>
  <path d="M100,163 L122,163 L132,150" stroke="#00D4FF" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- snowflake crystal mark, six-fold symmetric, rotating slowly -->
  <g transform="translate(195,135)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="40s" repeatCount="indefinite"/>
      <g stroke="url(#sf_iceGrad)" stroke-width="5" stroke-linecap="round" filter="url(#sf_glowTight)">
        <line x1="0" y1="-58" x2="0" y2="58"/>
        <line x1="-50" y1="-29" x2="50" y2="29"/>
        <line x1="-50" y1="29" x2="50" y2="-29"/>
      </g>
      <g stroke="#BCEEFF" stroke-width="3" stroke-linecap="round" opacity="0.85">
        <line x1="0" y1="-58" x2="-14" y2="-40"/>
        <line x1="0" y1="-58" x2="14" y2="-40"/>
        <line x1="0" y1="58" x2="-14" y2="40"/>
        <line x1="0" y1="58" x2="14" y2="40"/>
        <line x1="-50" y1="-29" x2="-38" y2="-10"/>
        <line x1="-50" y1="-29" x2="-58" y2="-12"/>
        <line x1="50" y1="29" x2="38" y2="10"/>
        <line x1="50" y1="29" x2="58" y2="12"/>
        <line x1="-50" y1="29" x2="-38" y2="10"/>
        <line x1="-50" y1="29" x2="-58" y2="12"/>
        <line x1="50" y1="-29" x2="38" y2="-10"/>
        <line x1="50" y1="-29" x2="58" y2="-12"/>
      </g>
      <circle cx="0" cy="0" r="10" fill="url(#sf_navyGrad)" stroke="#7DE3FF" stroke-width="2"/>
      <g fill="#00D4FF">
        <circle cx="0" cy="-58" r="3.6"><animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite"/></circle>
        <circle cx="50" cy="29" r="3" opacity="0.8"><animate attributeName="opacity" values="0.8;0.25;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
        <circle cx="-50" cy="29" r="3" opacity="0.6"/>
      </g>
    </g>
  </g>

  <!-- medical/data cross-equivalent: a small "graph node" badge -->
  <g transform="translate(300,66)" filter="url(#sf_glowTight)">
    <circle r="14" fill="#0A1830" stroke="#7DE3FF" stroke-width="2"/>
    <circle r="4.5" fill="#00D4FF">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- kicker tag -->
  <text x="430" y="76" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="14" letter-spacing="4" fill="#00D4FF" opacity="0.8">SCHEMA // WAREHOUSE // DATABRICKS CONNECTOR</text>
  <circle cx="1148" cy="71" r="4" fill="#7C3AED">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark glow layer -->
  <text x="428" y="172" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#7DE3FF" filter="url(#sf_glowSoft)" opacity="0.55">Snow<tspan fill="#00D4FF">Flake</tspan></text>
  <!-- wordmark crisp layer -->
  <text x="428" y="172" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#F2FAFF">Snow<tspan fill="#00D4FF">Flake</tspan></text>

  <!-- tagline -->
  <text x="430" y="210" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="19" letter-spacing="1" fill="#B9E8FF" opacity="0.78">Pharma Analytics Warehouse &amp; Secure Databricks Connector</text>

  <!-- underline tracer -->
  <line x1="430" y1="226" x2="490" y2="226" stroke="url(#sf_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="490;700;490" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="710" y1="226" x2="1160" y2="226" stroke="#00D4FF" stroke-width="1" opacity="0.12"/>
</svg>