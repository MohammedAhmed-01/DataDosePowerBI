<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DataDose Producer Simulator — Pharmacy Prescription Event Generator for Aiven Kafka">
  <defs>
    <linearGradient id="kp_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="45%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="kp_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="kp_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#231F20"/>
    </linearGradient>
    <pattern id="kp_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#7C3AED" stroke-width="0.6" opacity="0.06"/>
    </pattern>
    <radialGradient id="kp_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="kp_glowTight" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="kp_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="kp_frameClip"><rect width="1200" height="320" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#kp_frameClip)">
    <rect width="1200" height="320" fill="url(#kp_bg)"/>
    <rect width="1200" height="320" fill="url(#kp_grid)"/>
    <rect x="-300" y="0" width="260" height="320" fill="url(#kp_scan)">
      <animate attributeName="x" values="-300;1500" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="317" rx="22" fill="none" stroke="url(#kp_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.78;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <path d="M26 22 L26 48 M26 22 L52 22" stroke="#7C3AED" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 298 L1174 272 M1174 298 L1148 298" stroke="#00D4FF" stroke-width="2.2" fill="none" opacity="0.85"/>

  <g fill="#00D4FF" opacity="0.5">
    <circle cx="980" cy="56" r="2.2"><animate attributeName="cy" values="56;44;56" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="240" r="1.8"><animate attributeName="cy" values="240;254;240" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="260" r="1.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <text x="44" y="40" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13" letter-spacing="3" fill="#7C3AED" opacity="0.85">PRODUCER // SIMULATOR // AIVEN KAFKA</text>
  <circle cx="1162" cy="34" r="4.5" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <ellipse cx="200" cy="168" rx="150" ry="118" fill="url(#kp_halo)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Rx capsule / prescription mark -->
  <g transform="translate(140,148) rotate(-18)" filter="url(#kp_glowTight)">
    <rect x="-70" y="-26" width="140" height="52" rx="26" fill="#0F1A30" stroke="#00D4FF" stroke-width="1.6"/>
    <rect x="-70" y="-26" width="70" height="52" rx="26" fill="#7C3AED" opacity="0.85"/>
    <text x="-35" y="8" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="800" fill="#F2FAFF" text-anchor="middle">Rx</text>
    <circle cx="46" cy="0" r="4" fill="#00D4FF">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- emitted message stream -->
  <g filter="url(#kp_glowTight)">
    <circle cx="230" cy="148" r="4" fill="#7C3AED">
      <animate attributeName="cx" values="230;340;230" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="148" r="3" fill="#00D4FF" opacity="0.8">
      <animate attributeName="cx" values="230;340;230" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="230" cy="148" r="3.5" fill="#7C3AED" opacity="0.6">
      <animate attributeName="cx" values="230;340;230" dur="2.2s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Kafka node -->
  <g transform="translate(360,148)" filter="url(#kp_glowTight)">
    <circle r="26" fill="#0F1A30" stroke="#231F20" stroke-width="2"/>
    <circle r="26" fill="none" stroke="#00D4FF" stroke-width="1.2" opacity="0.6"/>
    <path d="M-8,-14 L-8,14 M-8,0 L8,-14 M-8,0 L8,14" stroke="#F2FAFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-8" cy="-14" r="2.4" fill="#00D4FF"/>
    <circle cx="-8" cy="14" r="2.4" fill="#00D4FF"/>
    <circle cx="8" cy="-14" r="2.4" fill="#7C3AED"/>
    <circle cx="8" cy="14" r="2.4" fill="#7C3AED"/>
  </g>
  <text x="360" y="196" font-family="'JetBrains Mono',Consolas,monospace" font-size="11" fill="#B9E8FF" text-anchor="middle" opacity="0.85">DataDose.in</text>

  <!-- wordmark -->
  <text x="430" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="66" font-weight="800" fill="#B9A6FF" filter="url(#kp_glowSoft)" opacity="0.5">Producer <tspan fill="#00D4FF">Simulator</tspan></text>
  <text x="430" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="66" font-weight="800" fill="#F2FAFF">Producer <tspan fill="#00D4FF">Simulator</tspan></text>

  <text x="432" y="188" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="18" letter-spacing="1" fill="#B9E8FF" opacity="0.8">Pharmacy Prescription Event Generator → Aiven Kafka</text>

  <text x="432" y="216" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#8FA8C7" opacity="0.85">Verified drug-INN pool · SASL_SCRAM-SHA-256 · keyed, idempotent delivery</text>

  <line x1="432" y1="234" x2="492" y2="234" stroke="url(#kp_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="492;700;492" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="710" y1="234" x2="1160" y2="234" stroke="#00D4FF" stroke-width="1" opacity="0.12"/>

  <g font-family="'JetBrains Mono',Consolas,monospace" font-size="11" fill="#8FA8C7">
    <text x="432" y="270">PYTHON 3.10+</text>
    <circle cx="560" cy="266.5" r="2.2" fill="#7C3AED"/>
    <text x="572" y="270">KAFKA-PYTHON</text>
    <circle cx="700" cy="266.5" r="2.2" fill="#00D4FF"/>
    <text x="712" y="270">PANDAS</text>
    <circle cx="792" cy="266.5" r="2.2" fill="#231F20"/>
    <text x="804" y="270" fill="#B9A6FF">TLS 1.2</text>
  </g>

  <rect x="0" y="316" width="1200" height="1" fill="#7C3AED" opacity="0.12"/>
  <rect x="-320" y="314.5" width="320" height="3" fill="url(#kp_edge)" opacity="0.5">
    <animate attributeName="x" values="-320;1220" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
