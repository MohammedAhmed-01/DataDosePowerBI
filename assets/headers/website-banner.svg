<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DataDose Website — Clinical Decision Support Frontend">
  <defs>
    <linearGradient id="wb_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="45%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="wb_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wb_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="wb_word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="wb_card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16213B"/>
      <stop offset="100%" stop-color="#0A1120"/>
    </linearGradient>
    <pattern id="wb_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#22D3EE" stroke-width="0.6" opacity="0.06"/>
    </pattern>
    <radialGradient id="wb_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <filter id="wb_glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wb_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="wb_frame"><rect width="1200" height="300" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#wb_frame)">
    <rect width="1200" height="300" fill="url(#wb_bg)"/>
    <rect width="1200" height="300" fill="url(#wb_grid)"/>
    <rect x="-280" y="0" width="240" height="300" fill="url(#wb_scan)">
      <animate attributeName="x" values="-280;1260" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="297" rx="22" fill="none" stroke="url(#wb_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.78;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <path d="M26 20 L26 46 M26 20 L52 20" stroke="#22D3EE" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 280 L1174 254 M1174 280 L1148 280" stroke="#7C3AED" stroke-width="2.2" fill="none" opacity="0.85"/>

  <g fill="#22D3EE" opacity="0.5">
    <circle cx="1000" cy="50" r="2.2"><animate attributeName="cy" values="50;38;50" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="230" r="1.8"><animate attributeName="cy" values="230;244;230" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="250" r="1.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- kicker -->
  <text x="44" y="42" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13" letter-spacing="3" fill="#22D3EE" opacity="0.85">DATADOSE // WEB APPLICATION</text>
  <circle cx="1156" cy="36" r="4.5" fill="#7C3AED">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- halo behind mock dashboard -->
  <ellipse cx="215" cy="175" rx="200" ry="130" fill="url(#wb_halo)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ===== mock browser / dashboard window ===== -->
  <g transform="translate(60,86)" filter="url(#wb_glow)">
    <rect x="0" y="0" width="320" height="190" rx="12" fill="url(#wb_card)" stroke="#2DD4BF" stroke-width="1.3" opacity="0.95"/>
    <!-- browser chrome -->
    <rect x="0" y="0" width="320" height="26" rx="12" fill="#101B31"/>
    <circle cx="16" cy="13" r="4" fill="#F97316" opacity="0.85"/>
    <circle cx="30" cy="13" r="4" fill="#F2C811" opacity="0.85"/>
    <circle cx="44" cy="13" r="4" fill="#2DD4BF" opacity="0.85"/>
    <rect x="64" y="7" width="200" height="12" rx="6" fill="#1B2A47"/>
    <text x="70" y="16" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#5EEAD4" opacity="0.8">datadose.ai/dashboard</text>

    <!-- sidebar -->
    <rect x="10" y="36" width="58" height="144" rx="6" fill="#101B31"/>
    <rect x="18" y="48" width="42" height="6" rx="3" fill="#2DD4BF" opacity="0.85"/>
    <rect x="18" y="62" width="42" height="6" rx="3" fill="#3B4B6B"/>
    <rect x="18" y="76" width="42" height="6" rx="3" fill="#3B4B6B"/>
    <rect x="18" y="90" width="42" height="6" rx="3" fill="#3B4B6B"/>
    <rect x="18" y="104" width="42" height="6" rx="3" fill="#3B4B6B"/>

    <!-- main content cards -->
    <rect x="76" y="36" width="110" height="46" rx="8" fill="#132038" stroke="#22D3EE" stroke-width="1" opacity="0.9"/>
    <rect x="86" y="46" width="50" height="6" rx="3" fill="#5EEAD4" opacity="0.8"/>
    <rect x="86" y="58" width="80" height="14" rx="3" fill="#22D3EE" opacity="0.35"/>

    <rect x="194" y="36" width="116" height="46" rx="8" fill="#132038" stroke="#7C3AED" stroke-width="1" opacity="0.9"/>
    <rect x="204" y="46" width="50" height="6" rx="3" fill="#C4B5FD" opacity="0.8"/>
    <rect x="204" y="58" width="90" height="14" rx="3" fill="#7C3AED" opacity="0.35"/>

    <!-- chart card with animated bars -->
    <rect x="76" y="90" width="234" height="80" rx="8" fill="#101B31" stroke="#2DD4BF" stroke-width="1" opacity="0.9"/>
    <g>
      <rect x="92" y="150" width="14" height="0" rx="2" fill="#2DD4BF">
        <animate attributeName="y" values="150;120;120" dur="1.3s" fill="freeze"/>
        <animate attributeName="height" values="0;30;30" dur="1.3s" fill="freeze"/>
      </rect>
      <rect x="114" y="150" width="14" height="0" rx="2" fill="#22D3EE">
        <animate attributeName="y" values="150;104;104" dur="1.3s" begin="0.15s" fill="freeze"/>
        <animate attributeName="height" values="0;46;46" dur="1.3s" begin="0.15s" fill="freeze"/>
      </rect>
      <rect x="136" y="150" width="14" height="0" rx="2" fill="#7C3AED">
        <animate attributeName="y" values="150;128;128" dur="1.3s" begin="0.3s" fill="freeze"/>
        <animate attributeName="height" values="0;22;22" dur="1.3s" begin="0.3s" fill="freeze"/>
      </rect>
      <rect x="158" y="150" width="14" height="0" rx="2" fill="#2DD4BF">
        <animate attributeName="y" values="150;96;96" dur="1.3s" begin="0.45s" fill="freeze"/>
        <animate attributeName="height" values="0;54;54" dur="1.3s" begin="0.45s" fill="freeze"/>
      </rect>
      <rect x="180" y="150" width="14" height="0" rx="2" fill="#22D3EE">
        <animate attributeName="y" values="150;112;112" dur="1.3s" begin="0.6s" fill="freeze"/>
        <animate attributeName="height" values="0;38;38" dur="1.3s" begin="0.6s" fill="freeze"/>
      </rect>
      <polyline points="99,120 121,104 143,128 165,96 187,112" fill="none" stroke="#F2C811" stroke-width="1.8" opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="212" y="102" width="86" height="58" rx="6" fill="#132038" opacity="0.9"/>
    <circle cx="255" cy="131" r="20" fill="none" stroke="#2DD4BF" stroke-width="6" opacity="0.85" stroke-dasharray="90 126" transform="rotate(-90 255 131)"/>
    <text x="255" y="135" font-family="'JetBrains Mono',monospace" font-size="10" fill="#F2FAFF" text-anchor="middle" font-weight="700">72%</text>
  </g>

  <!-- Next.js triangle mark -->
  <g transform="translate(430,100)" filter="url(#wb_glow)">
    <circle r="22" fill="#0A1120" stroke="#F2FAFF" stroke-width="1.5" opacity="0.9"/>
    <path d="M-9,-11 L-9,11 L11,11 Z" fill="none"/>
    <text x="0" y="6" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="800" fill="#F2FAFF" text-anchor="middle">N</text>
  </g>

  <!-- wordmark -->
  <text x="480" y="180" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#5EEAD4" filter="url(#wb_glowSoft)" opacity="0.5">Data<tspan fill="#22D3EE">Dose</tspan></text>
  <text x="480" y="180" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#F7FBFF">Data<tspan fill="url(#wb_word)">Dose</tspan></text>

  <text x="482" y="215" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="17" letter-spacing="2" fill="#8FD9EC" opacity="0.85">WEB APPLICATION · NEXT.JS FRONTEND</text>

  <text x="482" y="248" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#B7C6DC" opacity="0.85">Role-based dashboards for clinical decision support — physicians, pharmacists, patients &amp; admins</text>

  <line x1="482" y1="264" x2="542" y2="264" stroke="url(#wb_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="542;760;542" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="770" y1="264" x2="1160" y2="264" stroke="#22D3EE" stroke-width="1" opacity="0.12"/>

  <!-- tech strip -->
  <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="11.5" fill="#8FA8C7">
    <text x="482" y="285">NEXT.JS 15</text>
    <circle cx="562" cy="281.5" r="2.2" fill="#2DD4BF"/>
    <text x="574" y="285">TYPESCRIPT</text>
    <circle cx="662" cy="281.5" r="2.2" fill="#2DD4BF"/>
    <text x="674" y="285">TAILWIND CSS</text>
    <circle cx="772" cy="281.5" r="2.2" fill="#2DD4BF"/>
    <text x="784" y="285">PRISMA</text>
    <circle cx="850" cy="281.5" r="2.2" fill="#2DD4BF"/>
    <text x="862" y="285">POSTGRESQL</text>
  </g>
</svg>
