<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cleaning Code — Pharma Data Cleaning &amp; Enrichment Pipeline">
  <defs>
    <linearGradient id="cl_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="45%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="cl_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10B981" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cl_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <pattern id="cl_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#10B981" stroke-width="0.6" opacity="0.065"/>
    </pattern>

    <!-- CSV raw data gradient (dim, red-ish) -->
    <linearGradient id="cl_raw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <!-- clean data gradient (bright green) -->
    <linearGradient id="cl_clean" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- funnel body gradient -->
    <linearGradient id="cl_funnel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A2F"/>
      <stop offset="100%" stop-color="#0A1F15"/>
    </linearGradient>

    <radialGradient id="cl_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>

    <filter id="cl_glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cl_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cl_frame"><rect width="1200" height="280" rx="22"/></clipPath>
  </defs>

  <!-- ── base layer ── -->
  <g clip-path="url(#cl_frame)">
    <rect width="1200" height="280" fill="url(#cl_bg)"/>
    <rect width="1200" height="280" fill="url(#cl_grid)"/>
    <rect x="-280" y="0" width="240" height="280" fill="url(#cl_scan)">
      <animate attributeName="x" values="-280;1260" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- border pulse -->
  <rect x="1.5" y="1.5" width="1197" height="277" rx="22" fill="none"
        stroke="url(#cl_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.78;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD corners -->
  <path d="M26 20 L26 46 M26 20 L52 20" stroke="#10B981" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 260 L1174 234 M1174 260 L1148 260" stroke="#00D4FF" stroke-width="2.2" fill="none" opacity="0.85"/>

  <!-- floating particles -->
  <g fill="#10B981" opacity="0.55">
    <circle cx="980" cy="52" r="2.2"><animate attributeName="cy" values="52;40;52" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="212" r="1.8"><animate attributeName="cy" values="212;226;212" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="232" r="1.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- halo behind the pipeline mark -->
  <ellipse cx="205" cy="148" rx="140" ry="108" fill="url(#cl_halo)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ── PIPELINE MARK ── -->
  <!-- Stage labels -->
  <text x="44" y="76" font-family="'JetBrains Mono',Consolas,monospace" font-size="9" fill="#F97316" opacity="0.8" letter-spacing="1">RAW CSV</text>
  <text x="340" y="76" font-family="'JetBrains Mono',Consolas,monospace" font-size="9" fill="#10B981" opacity="0.8" letter-spacing="1">CLEAN</text>

  <!-- RAW input rows: 4 dim bars scrolling in from the left -->
  <g filter="url(#cl_glow)">
    <g>
      <rect x="30" y="86" width="70" height="8" rx="3" fill="url(#cl_raw)" opacity="0.9"/>
      <rect x="30" y="100" width="55" height="8" rx="3" fill="url(#cl_raw)" opacity="0.7"/>
      <rect x="30" y="114" width="65" height="8" rx="3" fill="url(#cl_raw)" opacity="0.8"/>
      <rect x="30" y="128" width="48" height="8" rx="3" fill="url(#cl_raw)" opacity="0.6"/>
      <rect x="30" y="142" width="62" height="8" rx="3" fill="url(#cl_raw)" opacity="0.75"/>
      <!-- animated traveling dim strip suggesting a stream -->
      <rect x="28" y="84" width="76" height="74" fill="url(#cl_bg)" opacity="0.5">
        <animate attributeName="x" values="28;-50;28" dur="3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- connector arrow into funnel -->
  <line x1="104" y1="128" x2="130" y2="128" stroke="#FFD43B" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
  <polygon points="130,123 140,128 130,133" fill="#FFD43B" opacity="0.7"/>

  <!-- FUNNEL body -->
  <g transform="translate(170,92)" filter="url(#cl_glow)">
    <!-- wide top opening -->
    <path d="M-60,0 L60,0 L32,72 L-32,72 Z" fill="url(#cl_funnel)" stroke="#10B981" stroke-width="1.8" opacity="0.9"/>
    <!-- funnel highlight left edge -->
    <line x1="-60" y1="0" x2="-32" y2="72" stroke="#10B981" stroke-width="2.5" opacity="0.6"/>
    <!-- funnel highlight right edge -->
    <line x1="60" y1="0" x2="32" y2="72" stroke="#22D3EE" stroke-width="2.5" opacity="0.6"/>
    <!-- animated scan inside funnel -->
    <rect x="-60" y="-4" width="30" height="80" fill="#10B981" opacity="0.07">
      <animate attributeName="x" values="-64;68;-64" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <!-- "gears" / process icon inside funnel -->
    <circle cx="0" cy="34" r="16" fill="#0A1F15" stroke="#10B981" stroke-width="1.6"/>
    <text x="0" y="39" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="700"
          fill="#10B981" text-anchor="middle">✓</text>
    <!-- neck -->
    <rect x="-12" y="72" width="24" height="24" rx="4" fill="url(#cl_funnel)" stroke="#10B981" stroke-width="1.4"/>
  </g>

  <!-- animated particle stream falling through funnel neck -->
  <g filter="url(#cl_glow)">
    <circle cx="170" cy="170" r="4" fill="#10B981">
      <animate attributeName="cy" values="168;230;168" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="170" r="3" fill="#22D3EE" opacity="0.8">
      <animate attributeName="cy" values="168;230;168" dur="1s" begin="0.33s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="1s" begin="0.33s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="170" r="3.5" fill="#10B981" opacity="0.6">
      <animate attributeName="cy" values="168;230;168" dur="1s" begin="0.66s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="1s" begin="0.66s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- connector arrow out of funnel -->
  <line x1="206" y1="128" x2="240" y2="128" stroke="#10B981" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
  <polygon points="240,123 252,128 240,133" fill="#10B981" opacity="0.85"/>

  <!-- CLEAN output rows: green, uniform, tidy -->
  <g filter="url(#cl_glow)">
    <rect x="257" y="86"  width="72" height="8" rx="3" fill="url(#cl_clean)" opacity="0.9"/>
    <rect x="257" y="100" width="72" height="8" rx="3" fill="url(#cl_clean)" opacity="0.75"/>
    <rect x="257" y="114" width="72" height="8" rx="3" fill="url(#cl_clean)" opacity="0.85"/>
    <rect x="257" y="128" width="72" height="8" rx="3" fill="url(#cl_clean)" opacity="0.7"/>
    <rect x="257" y="142" width="72" height="8" rx="3" fill="url(#cl_clean)" opacity="0.8"/>
  </g>

  <!-- step labels below the mark -->
  <text x="56" y="174" font-family="'JetBrains Mono',Consolas,monospace" font-size="9"
        fill="#FFD43B" opacity="0.75" text-anchor="middle">Raw</text>
  <text x="170" y="174" font-family="'JetBrains Mono',Consolas,monospace" font-size="9"
        fill="#10B981" opacity="0.75" text-anchor="middle">Process</text>
  <text x="295" y="174" font-family="'JetBrains Mono',Consolas,monospace" font-size="9"
        fill="#22D3EE" opacity="0.75" text-anchor="middle">Enriched</text>

  <!-- Python logo mark (two interlocked snake-head circles) -->
  <g transform="translate(358,102)">
    <circle cx="-8" cy="0"  r="10" fill="#4B8BBE" opacity="0.9" filter="url(#cl_glow)"/>
    <circle cx="8"  cy="20" r="10" fill="#FFD43B" opacity="0.9" filter="url(#cl_glow)"/>
    <circle cx="-8" cy="0"  r="4"  fill="#F2FAFF" opacity="0.6"/>
    <circle cx="8"  cy="20" r="4"  fill="#F2FAFF" opacity="0.6"/>
  </g>

  <!-- kicker tag -->
  <text x="430" y="76" font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
        font-size="14" letter-spacing="4" fill="#10B981" opacity="0.8">PANDAS // COLAB // GROQ // OPENFDA</text>
  <circle cx="1148" cy="71" r="4" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark — glow layer -->
  <text x="430" y="172" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="72" font-weight="800"
        fill="#10B981" filter="url(#cl_glowSoft)" opacity="0.55">Cleaning<tspan fill="#00D4FF"> Pipeline</tspan></text>
  <!-- wordmark — crisp layer -->
  <text x="430" y="172" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="72" font-weight="800"
        fill="#F2FAFF">Cleaning<tspan fill="#10B981"> Pipeline</tspan></text>

  <!-- tagline -->
  <text x="432" y="212" font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
        font-size="19" letter-spacing="1" fill="#B9FAD9" opacity="0.78">Raw CSV → Standardize → Verify → FDA-Enrich → Merge</text>

  <!-- underline tracer -->
  <line x1="432" y1="228" x2="492" y2="228" stroke="url(#cl_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="492;720;492" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="730" y1="228" x2="1160" y2="228" stroke="#10B981" stroke-width="1" opacity="0.12"/>
</svg>