<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pipeline Diagram — DataDose End-to-End Data Flow">
  <defs>
    <linearGradient id="pd_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="45%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="pd_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pd_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29B5E8"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <pattern id="pd_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#00D4FF" stroke-width="0.6" opacity="0.06"/>
    </pattern>
    <linearGradient id="pd_nodeA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DE3FF"/>
      <stop offset="100%" stop-color="#29B5E8"/>
    </linearGradient>
    <linearGradient id="pd_nodeB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2C811"/>
      <stop offset="100%" stop-color="#E8B800"/>
    </linearGradient>
    <linearGradient id="pd_nodeC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <radialGradient id="pd_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#29B5E8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#29B5E8" stop-opacity="0"/>
    </radialGradient>
    <filter id="pd_glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pd_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="pd_frame"><rect width="1200" height="280" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#pd_frame)">
    <rect width="1200" height="280" fill="url(#pd_bg)"/>
    <rect width="1200" height="280" fill="url(#pd_grid)"/>
    <rect x="-280" y="0" width="240" height="280" fill="url(#pd_scan)">
      <animate attributeName="x" values="-280;1260" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="277" rx="22" fill="none" stroke="url(#pd_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.75;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <path d="M26 20 L26 46 M26 20 L52 20" stroke="#00D4FF" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 260 L1174 234 M1174 260 L1148 260" stroke="#7C3AED" stroke-width="2.2" fill="none" opacity="0.85"/>

  <g fill="#00D4FF" opacity="0.5">
    <circle cx="980" cy="50" r="2.2"><animate attributeName="cy" values="50;38;50" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="220" r="1.8"><animate attributeName="cy" values="220;234;220" dur="6.5s" repeatCount="indefinite"/></circle>
  </g>

  <ellipse cx="185" cy="150" rx="150" ry="98" fill="url(#pd_halo)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- mini pipeline mark: sources -> processing -> warehouse, three nodes with animated flow -->
  <g filter="url(#pd_glow)">
    <rect x="46" y="118" width="70" height="66" rx="10" fill="#0C1528" stroke="url(#pd_nodeA)" stroke-width="1.6"/>
    <circle cx="81" cy="140" r="7" fill="url(#pd_nodeA)"/>
    <rect x="66" y="153" width="30" height="6" rx="2" fill="#7DE3FF" opacity="0.7"/>
    <rect x="66" y="163" width="22" height="6" rx="2" fill="#7DE3FF" opacity="0.5"/>
    <text x="81" y="198" font-family="'JetBrains Mono',Consolas,monospace" font-size="9" fill="#7DE3FF" text-anchor="middle" opacity="0.8">SOURCES</text>
  </g>

  <line x1="118" y1="151" x2="158" y2="151" stroke="#F2C811" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <polygon points="158,146 168,151 158,156" fill="#F2C811" opacity="0.8"/>

  <g filter="url(#pd_glow)">
    <rect x="170" y="118" width="70" height="66" rx="10" fill="#0C1528" stroke="url(#pd_nodeB)" stroke-width="1.6"/>
    <circle cx="205" cy="151" r="15" fill="none" stroke="url(#pd_nodeB)" stroke-width="2.2">
      <animateTransform attributeName="transform" type="rotate" values="0 205 151;360 205 151" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="205" cy="151" r="4" fill="#F2C811"/>
    <text x="205" y="198" font-family="'JetBrains Mono',Consolas,monospace" font-size="9" fill="#F2C811" text-anchor="middle" opacity="0.8">PROCESS</text>
  </g>

  <line x1="242" y1="151" x2="282" y2="151" stroke="#10B981" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <polygon points="282,146 292,151 282,156" fill="#10B981" opacity="0.8"/>

  <g filter="url(#pd_glow)">
    <rect x="294" y="112" width="70" height="78" rx="10" fill="#0C1528" stroke="url(#pd_nodeC)" stroke-width="1.6"/>
    <rect x="308" y="156" width="42" height="9" rx="3" fill="#10B981" opacity="0.55"/>
    <rect x="308" y="143" width="42" height="9" rx="3" fill="#5EEAD4" opacity="0.75"/>
    <rect x="308" y="130" width="42" height="9" rx="3" fill="#BCEEFF" opacity="0.95"/>
    <text x="329" y="200" font-family="'JetBrains Mono',Consolas,monospace" font-size="9" fill="#5EEAD4" text-anchor="middle" opacity="0.8">WAREHOUSE</text>
  </g>

  <!-- traveling packet across the mini pipeline -->
  <circle r="4" fill="#F2FAFF" filter="url(#pd_glow)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M60,151 L118,151 L168,151 L242,151 L292,151 L329,151"/>
    <animate attributeName="opacity" values="0;1;1;1;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- kicker tag -->
  <text x="430" y="64" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="13" letter-spacing="4" fill="#00D4FF" opacity="0.8">CSV // KAFKA // SPARK // SNOWFLAKE // POWER BI</text>
  <circle cx="1148" cy="59" r="4" fill="#7C3AED">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark -->
  <text x="428" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#7DE3FF" filter="url(#pd_glowSoft)" opacity="0.5">Pipeline<tspan fill="#00D4FF"> Diagram</tspan></text>
  <text x="428" y="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#F2FAFF">Pipeline<tspan fill="#00D4FF"> Diagram</tspan></text>

  <!-- tagline -->
  <text x="430" y="188" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="17" letter-spacing="1" fill="#B9E8FF" opacity="0.78">End-to-End Data Flow — Ingestion → Enrichment → Streaming → Warehouse → Serving</text>

  <!-- underline tracer -->
  <line x1="430" y1="204" x2="490" y2="204" stroke="url(#pd_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="490;700;490" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="710" y1="204" x2="1160" y2="204" stroke="#00D4FF" stroke-width="1" opacity="0.12"/>

  <text x="430" y="238" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="11" letter-spacing="1" fill="#7DE3FF" opacity="0.55">Full annotated diagram below ↓</text>
</svg>
