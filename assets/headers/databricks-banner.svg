<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PySpark Streaming Pipeline — Kafka to Neo4j to Snowflake">
  <defs>
    <linearGradient id="db_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="45%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="db_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3621" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF3621" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#FF3621" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="db_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3621"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <pattern id="db_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#FF3621" stroke-width="0.6" opacity="0.065"/>
    </pattern>

    <!-- node fill gradients -->
    <radialGradient id="db_gKafka" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3A2A20"/>
      <stop offset="100%" stop-color="#1A0F08"/>
    </radialGradient>
    <radialGradient id="db_gSpark" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3A1A0A"/>
      <stop offset="100%" stop-color="#1C0800"/>
    </radialGradient>
    <radialGradient id="db_gNeo4j" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0A1F2E"/>
      <stop offset="100%" stop-color="#050E18"/>
    </radialGradient>
    <radialGradient id="db_gSnow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0C1D28"/>
      <stop offset="100%" stop-color="#060E14"/>
    </radialGradient>

    <!-- halo behind the mark -->
    <radialGradient id="db_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3621" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF3621" stop-opacity="0"/>
    </radialGradient>

    <!-- stream particle gradient -->
    <linearGradient id="db_stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#29B5E8" stop-opacity="0"/>
    </linearGradient>

    <filter id="db_glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="db_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="db_frame"><rect width="1200" height="280" rx="22"/></clipPath>
  </defs>

  <!-- ── base layers ── -->
  <g clip-path="url(#db_frame)">
    <rect width="1200" height="280" fill="url(#db_bg)"/>
    <rect width="1200" height="280" fill="url(#db_grid)"/>
    <rect x="-280" y="0" width="240" height="280" fill="url(#db_scan)">
      <animate attributeName="x" values="-280;1260" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- border pulse -->
  <rect x="1.5" y="1.5" width="1197" height="277" rx="22" fill="none"
        stroke="url(#db_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.78;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD corners -->
  <path d="M26 20 L26 46 M26 20 L52 20" stroke="#FF3621" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 260 L1174 234 M1174 260 L1148 260" stroke="#00D4FF" stroke-width="2.2" fill="none" opacity="0.85"/>

  <!-- floating particles -->
  <g fill="#FF6B35" opacity="0.5">
    <circle cx="980" cy="52" r="2.2"><animate attributeName="cy" values="52;40;52" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="212" r="1.8"><animate attributeName="cy" values="212;226;212" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="232" r="1.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- halo behind pipeline mark -->
  <ellipse cx="210" cy="148" rx="195" ry="110" fill="url(#db_halo)"/>

  <!-- ═══════════════════════════════════════════════
       PIPELINE MARK — 4 tech nodes with stream lines
       positions: Kafka@x=44  Spark@x=142  Neo4j@x=240  Snow@x=338
       ═══════════════════════════════════════════════ -->

  <!-- connecting stream lines -->
  <g filter="url(#db_glow)">
    <!-- Kafka → Spark -->
    <line x1="88" y1="142" x2="116" y2="142" stroke="#FF6B35" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
    <!-- Spark → Neo4j -->
    <line x1="184" y1="142" x2="214" y2="142" stroke="#FF3621" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
    <!-- Neo4j → Snowflake -->
    <line x1="282" y1="142" x2="312" y2="142" stroke="#008CC1" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- animated data-packet stream across all lines -->
  <g filter="url(#db_glow)">
    <!-- packet 1 -->
    <rect x="-12" y="139" width="18" height="6" rx="3" fill="#00D4FF" opacity="0.9">
      <animate attributeName="x" values="-12;370" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <!-- packet 2 (delayed 0.8s) -->
    <rect x="-12" y="139" width="14" height="6" rx="3" fill="#FF6B35" opacity="0.85">
      <animate attributeName="x" values="-12;370" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- packet 3 (delayed 1.6s) -->
    <rect x="-12" y="139" width="10" height="6" rx="3" fill="#29B5E8" opacity="0.7">
      <animate attributeName="x" values="-12;370" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- KAFKA node -->
  <g transform="translate(44,142)" filter="url(#db_glow)">
    <circle r="44" fill="url(#db_gKafka)" stroke="#FF6B35" stroke-width="2"/>
    <!-- Kafka "K" lettermark -->
    <text x="0" y="6" font-family="'JetBrains Mono',Consolas,monospace" font-size="22" font-weight="800"
          fill="#FF6B35" text-anchor="middle">K</text>
    <!-- pulsing outer ring -->
    <circle r="44" fill="none" stroke="#FF6B35" stroke-width="1.2" opacity="0.4">
      <animate attributeName="r" values="44;52;44" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="64" font-family="'JetBrains Mono',Consolas,monospace" font-size="9"
          fill="#FF6B35" text-anchor="middle" opacity="0.8" letter-spacing="1">KAFKA</text>
  </g>

  <!-- SPARK node -->
  <g transform="translate(152,142)" filter="url(#db_glow)">
    <circle r="38" fill="url(#db_gSpark)" stroke="#E25A1C" stroke-width="2"/>
    <!-- Spark lightning bolt -->
    <path d="M6,-18 L-4,2 L2,2 L-6,18 L8,-2 L2,-2 Z" fill="#E25A1C"/>
    <circle r="38" fill="none" stroke="#E25A1C" stroke-width="1.2" opacity="0.35">
      <animate attributeName="r" values="38;46;38" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0;0.35" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="56" font-family="'JetBrains Mono',Consolas,monospace" font-size="9"
          fill="#E25A1C" text-anchor="middle" opacity="0.8" letter-spacing="1">PYSPARK</text>
  </g>

  <!-- NEO4J node -->
  <g transform="translate(256,142)" filter="url(#db_glow)">
    <circle r="36" fill="url(#db_gNeo4j)" stroke="#008CC1" stroke-width="2"/>
    <!-- Neo4j graph: 3 connected nodes -->
    <g fill="#008CC1" stroke="#008CC1" stroke-width="1.4">
      <line x1="-12" y1="-6" x2="10" y2="-12"/>
      <line x1="-12" y1="-6" x2="-4" y2="12"/>
      <line x1="10" y1="-12" x2="-4" y2="12"/>
      <circle cx="-12" cy="-6" r="5" fill="#008CC1"/>
      <circle cx="10" cy="-12" r="4.5" fill="#008CC1"/>
      <circle cx="-4" cy="12" r="4.5" fill="#008CC1"/>
    </g>
    <circle r="36" fill="none" stroke="#008CC1" stroke-width="1.2" opacity="0.35">
      <animate attributeName="r" values="36;44;36" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0;0.35" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="54" font-family="'JetBrains Mono',Consolas,monospace" font-size="9"
          fill="#008CC1" text-anchor="middle" opacity="0.8" letter-spacing="1">NEO4J</text>
  </g>

  <!-- SNOWFLAKE node -->
  <g transform="translate(353,142)" filter="url(#db_glow)">
    <circle r="35" fill="url(#db_gSnow)" stroke="#29B5E8" stroke-width="2"/>
    <!-- Snow crystal: three lines -->
    <g stroke="#29B5E8" stroke-width="2.4" stroke-linecap="round">
      <line x1="0" y1="-14" x2="0" y2="14"/>
      <line x1="-12" y1="-7" x2="12" y2="7"/>
      <line x1="-12" y1="7" x2="12" y2="-7"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#29B5E8"/>
    <circle r="35" fill="none" stroke="#29B5E8" stroke-width="1.2" opacity="0.35">
      <animate attributeName="r" values="35;43;35" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0;0.35" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="53" font-family="'JetBrains Mono',Consolas,monospace" font-size="9"
          fill="#29B5E8" text-anchor="middle" opacity="0.8" letter-spacing="1">SNOWFLAKE</text>
  </g>

  <!-- kicker tag -->
  <text x="430" y="76" font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
        font-size="14" letter-spacing="4" fill="#FF3621" opacity="0.85">KAFKA // PYSPARK // NEO4J // SNOWFLAKE</text>
  <circle cx="1148" cy="71" r="4" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark — glow -->
  <text x="430" y="174" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="72" font-weight="800"
        fill="#FF3621" filter="url(#db_glowSoft)" opacity="0.55">PySpark<tspan fill="#00D4FF"> Streaming</tspan></text>
  <!-- wordmark — crisp -->
  <text x="430" y="174" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="72" font-weight="800"
        fill="#F2FAFF">PySpark<tspan fill="#FF3621"> Streaming</tspan></text>

  <!-- tagline -->
  <text x="432" y="212" font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
        font-size="18.5" letter-spacing="1" fill="#FFD0C8" opacity="0.78">Real-Time Prescription Risk Scoring on Databricks</text>

  <!-- underline tracer -->
  <line x1="432" y1="228" x2="492" y2="228" stroke="url(#db_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="492;720;492" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="730" y1="228" x2="1160" y2="228" stroke="#FF3621" stroke-width="1" opacity="0.12"/>
</svg>