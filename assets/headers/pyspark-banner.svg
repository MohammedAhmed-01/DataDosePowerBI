<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PySpark Streaming Pipeline — Kafka, Neo4j, Snowflake">
  <defs>
    <linearGradient id="ps_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="45%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>

    <linearGradient id="ps_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E25A1C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E25A1C" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#E25A1C" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ps_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E25A1C"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <pattern id="ps_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#E25A1C" stroke-width="0.6" opacity="0.06"/>
    </pattern>

    <!-- Spark flame gradient -->
    <linearGradient id="ps_flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBB03B"/>
      <stop offset="45%" stop-color="#F7931E"/>
      <stop offset="100%" stop-color="#E25A1C"/>
    </linearGradient>
    <linearGradient id="ps_flameInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE3B0"/>
      <stop offset="100%" stop-color="#FBB03B"/>
    </linearGradient>

    <radialGradient id="ps_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F7931E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F7931E" stop-opacity="0"/>
    </radialGradient>

    <filter id="ps_glowTight" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ps_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="ps_frameClip"><rect width="1200" height="320" rx="22"/></clipPath>
  </defs>

  <!-- background -->
  <g clip-path="url(#ps_frameClip)">
    <rect width="1200" height="320" fill="url(#ps_bg)"/>
    <rect width="1200" height="320" fill="url(#ps_grid)"/>
    <rect x="-300" y="0" width="260" height="320" fill="url(#ps_scan)">
      <animate attributeName="x" values="-300;1500" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- border -->
  <rect x="1.5" y="1.5" width="1197" height="317" rx="22" fill="none" stroke="url(#ps_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.78;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD corner brackets -->
  <path d="M26 22 L26 48 M26 22 L52 22" stroke="#F7931E" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 298 L1174 272 M1174 298 L1148 298" stroke="#7C3AED" stroke-width="2.2" fill="none" opacity="0.85"/>

  <!-- floating particles -->
  <g fill="#00D4FF" opacity="0.5">
    <circle cx="980" cy="56" r="2.2"><animate attributeName="cy" values="56;44;56" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="240" r="1.8"><animate attributeName="cy" values="240;254;240" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="260" r="1.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- module tag -->
  <text x="44" y="40" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13" letter-spacing="3" fill="#F7931E" opacity="0.85">PYSPARK // STRUCTURED STREAMING</text>
  <circle cx="1162" cy="34" r="4.5" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- halo behind Spark mark -->
  <ellipse cx="205" cy="168" rx="150" ry="118" fill="url(#ps_halo)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ===== Spark flame mark ===== -->
  <g transform="translate(155,120)" filter="url(#ps_glowTight)">
    <path d="M50,0
             C20,28 4,56 4,86
             C4,122 26,150 56,150
             C42,132 38,112 46,94
             C52,110 66,120 62,140
             C86,124 100,100 96,72
             C90,86 80,94 70,92
             C82,64 78,32 50,0 Z"
          fill="url(#ps_flame)"/>
    <path d="M54,44
             C42,58 36,72 38,88
             C40,104 50,116 62,116
             C56,106 54,96 58,86
             C62,96 70,100 68,112
             C80,102 86,88 82,74
             C78,82 72,86 66,84
             C72,68 68,54 54,44 Z"
          fill="url(#ps_flameInner)" opacity="0.9"/>
  </g>

  <!-- data-flow nodes: Kafka -> Spark -> Neo4j -> Snowflake -->
  <g transform="translate(60,238)" font-family="'JetBrains Mono',Consolas,monospace" font-size="10.5" filter="url(#ps_glowTight)">
    <circle cx="0" cy="0" r="7" fill="#000000" stroke="#F2FAFF" stroke-width="1.4"/>
    <text x="0" y="24" fill="#B9E8FF" text-anchor="middle" opacity="0.85">KAFKA</text>

    <line x1="10" y1="0" x2="72" y2="0" stroke="#F7931E" stroke-width="1.6" opacity="0.7"/>
    <circle cx="82" cy="0" r="7" fill="#E25A1C"/>
    <text x="82" y="24" fill="#FDCB9E" text-anchor="middle" opacity="0.9">SPARK</text>

    <line x1="92" y1="0" x2="154" y2="0" stroke="#008CC1" stroke-width="1.6" opacity="0.7"/>
    <circle cx="164" cy="0" r="7" fill="#008CC1"/>
    <text x="164" y="24" fill="#9FE1F5" text-anchor="middle" opacity="0.9">NEO4J</text>

    <line x1="174" y1="0" x2="236" y2="0" stroke="#29B5E8" stroke-width="1.6" opacity="0.7"/>
    <circle cx="246" cy="0" r="7" fill="#29B5E8">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="246" y="24" fill="#BEE9FA" text-anchor="middle" opacity="0.9">SNOWFLAKE</text>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="430" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="70" font-weight="800" fill="#7DE3FF" filter="url(#ps_glowSoft)" opacity="0.5">Py<tspan fill="#F7931E">Spark</tspan> Pipeline</text>
  <text x="430" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="70" font-weight="800" fill="#F2FAFF">Py<tspan fill="#F7931E">Spark</tspan><tspan fill="#F2FAFF"> Pipeline</tspan></text>

  <!-- tagline -->
  <text x="432" y="188" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="18" letter-spacing="1" fill="#B9E8FF" opacity="0.8">Kafka → PySpark → Neo4j → Snowflake → Kafka</text>

  <!-- description line -->
  <text x="432" y="216" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" fill="#8FA8C7" opacity="0.85">Real-time prescription risk scoring with Delta Lake dead-letter recovery</text>

  <!-- underline tracer -->
  <line x1="432" y1="234" x2="492" y2="234" stroke="url(#ps_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="492;700;492" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="710" y1="234" x2="1160" y2="234" stroke="#00D4FF" stroke-width="1" opacity="0.12"/>

  <!-- bottom badge strip -->
  <g font-family="'JetBrains Mono',Consolas,monospace" font-size="11" fill="#8FA8C7">
    <text x="432" y="270">DATABRICKS</text>
    <circle cx="524" cy="266.5" r="2.2" fill="#E25A1C"/>
    <text x="536" y="270">STRUCTURED STREAMING</text>
    <circle cx="700" cy="266.5" r="2.2" fill="#00D4FF"/>
    <text x="712" y="270">DELTA LAKE</text>
    <circle cx="806" cy="266.5" r="2.2" fill="#7C3AED"/>
    <text x="818" y="270">AURA DB</text>
  </g>

  <!-- bottom comet baseline -->
  <rect x="0" y="316" width="1200" height="1" fill="#E25A1C" opacity="0.12"/>
  <rect x="-320" y="314.5" width="320" height="3" fill="url(#ps_edge)" opacity="0.5">
    <animate attributeName="x" values="-320;1220" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
