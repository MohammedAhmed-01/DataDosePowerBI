<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kafka Producer Simulator — DataDose Prescription Event Stream">
  <defs>
    <linearGradient id="kb_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/><stop offset="45%" stop-color="#0b0f19"/><stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="kb_scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF6B35" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="kb_edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="kb_lane" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="kb_broker" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C2233"/><stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <radialGradient id="kb_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <pattern id="kb_grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#FF6B35" stroke-width="0.6" opacity="0.065"/>
    </pattern>
    <filter id="kb_glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="kb_glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="kb_frame"><rect width="1200" height="280" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#kb_frame)">
    <rect width="1200" height="280" fill="url(#kb_bg)"/>
    <rect width="1200" height="280" fill="url(#kb_grid)"/>
    <rect x="-280" y="0" width="240" height="280" fill="url(#kb_scan)">
      <animate attributeName="x" values="-280;1260" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="277" rx="22" fill="none"
        stroke="url(#kb_edge)" stroke-width="1.4" opacity="0.55">
    <animate attributeName="opacity" values="0.3;0.78;0.3" dur="4s" repeatCount="indefinite"/>
  </rect>

  <path d="M26 20 L26 46 M26 20 L52 20" stroke="#FF6B35" stroke-width="2.2" fill="none" opacity="0.85"/>
  <path d="M1174 260 L1174 234 M1174 260 L1148 260" stroke="#00D4FF" stroke-width="2.2" fill="none" opacity="0.85"/>

  <!-- ambient particles -->
  <g fill="#FF6B35" opacity="0.55">
    <circle cx="980" cy="52" r="2.2"><animate attributeName="cy" values="52;40;52" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="212" r="1.8"><animate attributeName="cy" values="212;226;212" dur="6.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- halo behind the event-stream mark -->
  <ellipse cx="200" cy="148" rx="155" ry="110" fill="url(#kb_halo)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ── EVENT-STREAM WAVEFORM: 5 lanes, messages flowing right ── -->
  <!-- lane lines -->
  <line x1="32" y1="80" x2="290" y2="80" stroke="#FF6B35" stroke-width="1.2" opacity="0.18"/><line x1="32" y1="106" x2="290" y2="106" stroke="#FF6B35" stroke-width="1.2" opacity="0.18"/><line x1="32" y1="132" x2="290" y2="132" stroke="#FF6B35" stroke-width="1.2" opacity="0.18"/><line x1="32" y1="158" x2="290" y2="158" stroke="#FF6B35" stroke-width="1.2" opacity="0.18"/><line x1="32" y1="184" x2="290" y2="184" stroke="#FF6B35" stroke-width="1.2" opacity="0.18"/>

  <!-- animated message dots per lane, each with a staggered delay -->
  
  <circle cy="80" r="6" fill="#FF6B35" filter="url(#kb_glow)" opacity="0.9">
    <animate attributeName="cx" values="30;292;30" dur="1.60s" begin="0.00s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0.9;0" dur="1.60s" begin="0.00s" repeatCount="indefinite"/>
  </circle>
  <circle cy="80" r="3.5" fill="#FFD166" opacity="0.7">
    <animate attributeName="cx" values="30;292;30" dur="1.60s" begin="0.80s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="1.60s" begin="0.80s" repeatCount="indefinite"/>
  </circle>
  <circle cy="106" r="6" fill="#FF6B35" filter="url(#kb_glow)" opacity="0.9">
    <animate attributeName="cx" values="30;292;30" dur="1.85s" begin="0.32s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0.9;0" dur="1.85s" begin="0.32s" repeatCount="indefinite"/>
  </circle>
  <circle cy="106" r="3.5" fill="#FFD166" opacity="0.7">
    <animate attributeName="cx" values="30;292;30" dur="1.85s" begin="1.12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="1.85s" begin="1.12s" repeatCount="indefinite"/>
  </circle>
  <circle cy="132" r="6" fill="#FF6B35" filter="url(#kb_glow)" opacity="0.9">
    <animate attributeName="cx" values="30;292;30" dur="2.10s" begin="0.64s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0.9;0" dur="2.10s" begin="0.64s" repeatCount="indefinite"/>
  </circle>
  <circle cy="132" r="3.5" fill="#FFD166" opacity="0.7">
    <animate attributeName="cx" values="30;292;30" dur="2.10s" begin="1.44s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2.10s" begin="1.44s" repeatCount="indefinite"/>
  </circle>
  <circle cy="158" r="6" fill="#FF6B35" filter="url(#kb_glow)" opacity="0.9">
    <animate attributeName="cx" values="30;292;30" dur="2.35s" begin="0.96s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0.9;0" dur="2.35s" begin="0.96s" repeatCount="indefinite"/>
  </circle>
  <circle cy="158" r="3.5" fill="#FFD166" opacity="0.7">
    <animate attributeName="cx" values="30;292;30" dur="2.35s" begin="1.76s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2.35s" begin="1.76s" repeatCount="indefinite"/>
  </circle>
  <circle cy="184" r="6" fill="#FF6B35" filter="url(#kb_glow)" opacity="0.9">
    <animate attributeName="cx" values="30;292;30" dur="2.60s" begin="1.28s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0.9;0" dur="2.60s" begin="1.28s" repeatCount="indefinite"/>
  </circle>
  <circle cy="184" r="3.5" fill="#FFD166" opacity="0.7">
    <animate attributeName="cx" values="30;292;30" dur="2.60s" begin="2.08s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="2.60s" begin="2.08s" repeatCount="indefinite"/>
  </circle>

  <!-- ── KAFKA BROKER NODE STACK ── -->
  <g transform="translate(170,60)" filter="url(#kb_glow)">
    <!-- 3 stacked broker tiles -->
    <rect x="-52" y="0"  width="104" height="32" rx="7" fill="url(#kb_broker)" stroke="#FF6B35" stroke-width="1.6"/>
    <rect x="-52" y="38" width="104" height="32" rx="7" fill="url(#kb_broker)" stroke="#FF6B35" stroke-width="1.6" opacity="0.85"/>
    <rect x="-52" y="76" width="104" height="32" rx="7" fill="url(#kb_broker)" stroke="#FF6B35" stroke-width="1.3" opacity="0.65"/>
    <!-- "K" lettermark on each -->
    <text x="0" y="22" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#FF6B35" text-anchor="middle">broker-0</text>
    <text x="0" y="60" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#FF6B35" text-anchor="middle" opacity="0.85">broker-1</text>
    <text x="0" y="98" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#FF6B35" text-anchor="middle" opacity="0.65">broker-2</text>
    <!-- pulsing status dots -->
    <circle cx="42" cy="16" r="4" fill="#10B981"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="42" cy="54" r="4" fill="#10B981" opacity="0.85"><animate attributeName="opacity" values="0.85;0.25;0.85" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="42" cy="92" r="4" fill="#FFD166" opacity="0.65"><animate attributeName="opacity" values="0.65;0.2;0.65" dur="2.4s" repeatCount="indefinite"/></circle>
    <!-- topic label -->
    <text x="0" y="134" font-family="'JetBrains Mono',monospace" font-size="10" fill="#00D4FF" text-anchor="middle" letter-spacing="1" opacity="0.8">DataDose.in</text>
    <line x1="-52" y1="118" x2="52" y2="118" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- connector arrow from lanes to broker -->
  <line x1="292" y1="148" x2="316" y2="148" stroke="#FF6B35" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
  <polygon points="316,143 328,148 316,153" fill="#FF6B35" opacity="0.85"/>

  <!-- kicker tag -->
  <text x="432" y="78" font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
        font-size="14" letter-spacing="4" fill="#FF6B35" opacity="0.8">KAFKA // PRODUCER // SASL-SSL // SCRAM-SHA-256</text>
  <circle cx="1148" cy="73" r="4" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark — glow -->
  <text x="430" y="174" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="72" font-weight="800" fill="#FF6B35" filter="url(#kb_glowSoft)" opacity="0.55">Kafka<tspan fill="#00D4FF"> Simulator</tspan></text>
  <!-- wordmark — crisp -->
  <text x="430" y="174" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="72" font-weight="800" fill="#F2FAFF">Kafka<tspan fill="#FF6B35"> Simulator</tspan></text>

  <!-- tagline -->
  <text x="432" y="212" font-family="'JetBrains Mono','Fira Code',Consolas,monospace"
        font-size="19" letter-spacing="1" fill="#FFD0B5" opacity="0.78">Pharmacy Prescription Events → Aiven Kafka → DataDose Pipeline</text>

  <!-- underline tracer -->
  <line x1="432" y1="228" x2="492" y2="228" stroke="url(#kb_edge)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x2" values="492;720;492" dur="3.8s" repeatCount="indefinite"/>
  </line>
  <line x1="730" y1="228" x2="1160" y2="228" stroke="#FF6B35" stroke-width="1" opacity="0.12"/>
</svg>